kind = "web"
previewPath = "/"
title = "Learnova LMS"
version = "1.0.0"
id = "artifacts/learnova"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23375

[services.development]
run = "pnpm --filter @workspace/learnova run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/learnova", "run", "build" ]
publicDir = "artifacts/learnova/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23375"
BASE_PATH = "/"
